<!doctype html>
<html>
	<head>
		<meta charset="utf-8">
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
		<meta name="viewport" content="initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,width=device-width,minimal-ui">
		<meta name="apple-mobile-web-app-capable" content="yes">
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
		<meta name="HandheldFriendly" content="true">
		<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
		<title>Om Nom Run</title>
		<style>
		html, body {
			background: #000;
			color: #ff7;
			font: 14px/1.2 Arial, "Helvetica Neue", sans-serif;
			height: 100%;
		}
		* {
		  padding: 0;
		  margin: 0;
		}
		body {
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			background-color: #333333;
		}
		#gameContainer {
		  display: flex;
		  height: 100%;
		  width: 100%;
		}
		#game-iframe {
		  flex: 1;
		  background-color: #333333;
		  border: none;
		}
		</style>
	</head>
	<body>
		<div id="gameContainer">
			<iframe id="game-iframe" src="" webkit-playsinline="true" scrolling="no" frameborder="0" allow="autoplay"></iframe>
		</div>

		<script>
		(function(){
			const packageId = "om-nom-run";
			const affiliateId = "A1000-10";
			const iframe = document.querySelector("#game-iframe");
			if(iframe) {
				iframe.setAttribute("src", 'https://play.famobi.com/' + packageId + "/" + affiliateId);
			}
		})();
		</script>
	</body>
</html>
